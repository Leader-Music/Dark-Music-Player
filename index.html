<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Music Player - Bypass off</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            background-color: #050505; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: white;
        }

        /* Section 1: Initial Message Box */
        #status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .info-box {
            border: 2px solid #ff4d4d;
            padding: 30px;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            max-width: 500px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.3); }
            50% { box-shadow: 0 0 20px rgba(255, 77, 77, 0.6); }
            100% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.3); }
        }

        .info-box h2 { color: #ff4d4d; margin-bottom: 15px; text-transform: uppercase; }
        .info-box p { line-height: 1.6; font-size: 1.1rem; }

        /* Section 2: Leader Security Info (Loading Replacement) */
        #loader-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ff41;
        }

        .security-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    
        .progress-container {
            width: 80%;
            max-width: 300px;
            height: 10px;
            border: 1px solid #00ff41;
            padding: 2px;
        }

        .progress-bar {
            height: 100%;
            background: #00ff41;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Section 3: Hacking Matrix Background */
        #hacker-canvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay-text {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #00ff41;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="status-container">
        <div class="info-box">
            <h2>Website in maintenance</h2>
            <p>Hosting domain and developer side are currently stopped by developer (leader). Wait for new updated version.</p>
        </div>
    </div>

    <div id="loader-screen">
        <div class="security-text">Leader Server File</div>
        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>
        <p id="loading-percent" style="margin-top:10px">Scanning: 0%</p>
    </div>

    <canvas id="hacker-canvas"></canvas>
    <div id="hacker-ui" class="overlay-text" style="display:none;">
        &gt; SYSTEM OVERRIDE INITIATED<br>
        &gt; BYPASSING FIREWALL... OK<br>
        &gt; LOADING CORE_DATA...<br>
        &gt; DEVELOPER: LEADER
    </div>

    <script>
        const statusContainer = document.getElementById('status-container');
        const loaderScreen = document.getElementById('loader-screen');
        const progressBar = document.getElementById('progress');
        const percentText = document.getElementById('loading-percent');
        const canvas = document.getElementById('hacker-canvas');
        const hackerUI = document.getElementById('hacker-ui');

        // Logic Timeline
        setTimeout(() => {
            // 1. Hide first box
            statusContainer.style.display = 'none';
            // 2. Show Leader Security Info
            loaderScreen.style.display = 'flex';
            
            // Start Progress Bar (5 seconds)
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    startHackingSequence();
                } else {
                    width++;
                    progressBar.style.width = width + '%';
                    percentText.innerText = 'Scanning: ' + width + '%';
                }
            }, 50); // 50ms * 100 = 5000ms (5 seconds)

        }, 5000); // Wait 5 seconds on initial message

        function startHackingSequence() {
            loaderScreen.style.display = 'none';
            canvas.style.display = 'block';
            hackerUI.style.display = 'block';
            
            runMatrixEffect();

            // Auto-Close/Finish after 5 seconds of hacking
            setTimeout(() => {
                document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh; color:#333; font-size:10px;'>SESSION_CLOSED</div>";
                window.close();
            }, 5000);
        }

        function runMatrixEffect() {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = "0101010101ABCDEFHIJKLMNOPQRSTUVWXYZ";
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff41";
                ctx.font = fontSize + "px monospace";

                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }

        // Mobile scaling fix
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
